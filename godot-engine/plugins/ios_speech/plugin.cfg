[plugin]

name="iOS Speech Recognition"
description="Provides iOS Speech Framework integration for real-time speech recognition using SFSpeechRecognizer"
author="Mystery Files Team"
version="1.0.0"
license="MIT"

[dependencies]

godot_version="4.2.0"
min_api_version="4.2.0"

[platforms]

ios=true

[features]

realtime_speech_recognition=true
offline_recognition=true
multiple_locales=true
